name: GCC AI Agent Hackathon Submission
description: Submit your project for GCC AI Agent Hackathon review
title: "[Hackathon Submission] <project name>"
labels:
  - hackathon-submission
body:
  - type: input
    id: project_name
    attributes:
      label: 项目名称
      description: 项目对外使用的正式名称
      placeholder: My AI Agent Project
    validations:
      required: true

  - type: dropdown
    id: track
    attributes:
      label: 参赛赛道
      description: 请选择最匹配的一条赛道
      options:
        - 治理（Governance）
        - 分配（Allocation）
        - 影响力评估（Impact Evaluation）
        - 工作流优化（Workflow Optimization）
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 项目简介（TL;DR）
      description: 用 3-5 句话说明你在做什么、为谁解决问题、为什么重要
      placeholder: |
        我们正在构建...
        服务对象是...
        预期影响是...
    validations:
      required: true

  - type: textarea
    id: problem_statement
    attributes:
      label: 要解决的真实问题
      description: 请说明当前痛点、现有方案不足，以及它在 GCC/DAO 场景中的具体体现
      placeholder: 当前问题是...
    validations:
      required: true

  - type: textarea
    id: solution_design
    attributes:
      label: 方案与技术实现
      description: 请描述 Agent 设计、关键工作流、工具集成和核心实现路径
      placeholder: 我们的方案是...
    validations:
      required: true

  - type: input
    id: repo
    attributes:
      label: 代码仓库链接
      description: 请提供项目主仓库或核心代码仓库链接
      placeholder: https://github.com/your-org/your-project
    validations:
      required: true

  - type: input
    id: demo_video
    attributes:
      label: Demo 视频链接
      description: 请提供可访问的演示视频（YouTube、Loom 等）
      placeholder: https://...
    validations:
      required: true

  - type: textarea
    id: public_goods
    attributes:
      label: 公共物品属性
      description: 请说明项目如何开放、可复用，以及如何服务更广泛社区
      placeholder: 我们将通过以下方式确保公共性...
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: 风险与依赖
      description: 列出你已识别的主要风险，以及应对策略
      placeholder: 主要风险包括...

  - type: input
    id: email
    attributes:
      label: 联系邮箱
      description: 用于后续沟通与通知
      placeholder: you@example.com
    validations:
      required: true

  - type: input
    id: payout_address
    attributes:
      label: 收款地址
      description: 用于接收资助的以太坊主网链上地址
      placeholder: 0x...
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交确认
      options:
        - label: 我确认本提交信息真实有效，并愿意在 Issue 中进行公开讨论
          required: true
        - label: 我理解四赛道独立评审，获奖结果与奖金发放以官方公告为准
          required: true