name: OpenClaw Grant Application
description: Apply for GCC OpenClaw Track funding/support
title: "[Application] <project name>"
labels:
  - application
body:
  - type: input
    id: project_name
    attributes:
      label: 项目名称
      description: 项目对外使用的正式名称
      placeholder: My OpenClaw Project
    validations:
      required: true

  - type: dropdown
    id: direction
    attributes:
      label: 申请方向
      description: 请选择最接近的方向
      options:
        - Agent 隐私与安全基础设施
        - 服务于加密公共物品的应用层 Agent
        - 其他（仍需符合公共物品导向）
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 项目简介（TL;DR）
      description: 用 3-5 句话介绍你在做什么、为什么重要
      placeholder: |
        我们正在构建...
        目标用户是...
        预期影响是...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请说明当前痛点和现有方案不足
      placeholder: 当前问题是...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 方案与技术路径
      description: 包含 OpenClaw 相关设计、系统架构或关键实现
      placeholder: 我们的方案是...
    validations:
      required: true

  - type: input
    id: repo
    attributes:
      label: 代码仓库链接
      description: 请提供项目主仓库或核心代码仓库链接
      placeholder: https://github.com/your-org/your-project
    validations:
      required: true

  - type: input
    id: demo_video
    attributes:
      label: Demo 视频链接
      description: 请提供可访问的演示视频（YouTube、Loom 等）
      placeholder: https://...
    validations:
      required: true

  - type: textarea
    id: public_goods
    attributes:
      label: 公共物品属性
      description: 请说明项目如何开放、可复用，以及如何服务更广泛社区
      placeholder: 我们将通过以下方式确保公共性...
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: 风险与依赖
      description: 列出你已识别的主要风险，以及应对策略
      placeholder: 主要风险包括...
    validations:
      required: true

  - type: input
    id: payout_address
    attributes:
      label: 收款地址
      description: 用于接收资助的以太坊主网链上地址
      placeholder: 0x...
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交确认
      options:
        - label: 我确认本申请信息真实有效，并愿意在 Issue 中进行公开讨论
          required: true
        - label: 我理解评审结果与资助形式将由 GCC 综合评估后决定
          required: true
